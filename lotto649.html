<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大樂透開獎號碼格子圖</title>
<style>
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f5f5f3;
    margin: 0;
    padding: 20px;
    color: #222;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 12px;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    font-size: 13px;
    color: #555;
  }
  .legend { display: flex; align-items: center; gap: 4px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
  button {
    border: 1px solid #ccc;
    background: #fff;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { background: #eee; }
  button:disabled { opacity: 0.5; cursor: default; }
  #status { font-size: 12px; color: #888; }
  #scrollBox {
    overflow: auto;
    max-height: 560px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
  }
  table { border-collapse: collapse; font-size: 11px; }
  th, td { border-bottom: 1px solid #eee; }
  th {
    position: sticky; top: 0; z-index: 2;
    background: #fafaf8; color: #888; font-weight: 400;
    padding: 4px 0; text-align: center; width: 20px; min-width: 20px;
  }
  th:first-child, td:first-child {
    position: sticky; left: 0; z-index: 3;
    background: #fafaf8; text-align: left; padding: 4px 10px;
    border-right: 1px solid #ddd; color: #555; white-space: nowrap;
  }
  td { text-align: center; padding: 1px 0; }
  .ball {
    width: 17px; height: 17px; margin: 1px auto;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500;
  }
  .main { background: #AFA9EC; color: #26215C; }
  .special { background: #FAC775; color: #412402; }
</style>
</head>
<body>

<h1>大樂透開獎號碼格子圖</h1>
<div class="toolbar">
  <span class="legend"><span class="dot" style="background:#AFA9EC;"></span>中獎號碼</span>
  <span class="legend"><span class="dot" style="background:#FAC775;"></span>特別號</span>
  <button id="refreshBtn">手動更新最新一期</button>
  <span id="status"></span>
</div>

<div id="scrollBox">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  // 部署完 GAS 網頁應用程式後,把網址貼在這裡
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbx-_zyhOdZNwxucwON4KibDFT0-Sx3_4W5rg5hL2EOEu3BdvKlwQ_QHi8znyNyDOb7pmg/exec';

  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');
  const statusEl = document.getElementById('status');
  const refreshBtn = document.getElementById('refreshBtn');

  function buildHeader() {
    let hr = '<tr><th>日期</th>';
    for (let n = 1; n <= 49; n++) hr += '<th>' + n + '</th>';
    hr += '</tr>';
    thead.innerHTML = hr;
  }

  function render(data) {
    let br = '';
    data.forEach(function (row) {
      br += '<tr><td>' + row.date + '</td>';
      for (let n = 1; n <= 49; n++) {
        let cell = '';
        if (row.main.includes(n)) {
          cell = '<div class="ball main">' + n + '</div>';
        } else if (n === row.special) {
          cell = '<div class="ball special">' + n + '</div>';
        }
        br += '<td>' + cell + '</td>';
      }
      br += '</tr>';
    });
    tbody.innerHTML = br;
  }

  function load(forceRefresh) {
    statusEl.textContent = '讀取中...';
    refreshBtn.disabled = true;
    const url = GAS_URL + (forceRefresh ? '?action=refresh' : '');
    fetch(url)
      .then(function (res) { return res.json(); })
      .then(function (data) {
        render(data);
        const now = new Date();
        statusEl.textContent = '共 ' + data.length + ' 期,最後更新於 ' + now.toLocaleTimeString('zh-TW');
      })
      .catch(function (err) {
        statusEl.textContent = '讀取失敗,請確認 GAS_URL 是否已設定正確。';
        console.error(err);
      })
      .finally(function () {
        refreshBtn.disabled = false;
      });
  }

  refreshBtn.addEventListener('click', function () { load(true); });

  buildHeader();
  load(false);
</script>

</body>
</html>
